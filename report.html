<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Route Search (Report Mode)</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        /* Report mode specific styles if needed */
        body.report-mode {
            border-top: 5px solid var(--accent);
        }
    </style>
</head>

<body class="report-mode">
    <div class="wrap">
        <header>
            <div style="font-size:10px; color:rgba(255,255,255,0.2); float:right;">v2.1</div>
            <h1>Route Search</h1>
            <div class="meta" id="countInfo">Loading data...</div>
            <div class="meta" id="status"></div>
        </header>

        <div class="search-box">
            <input type="text" id="q" placeholder="Start typing route, yard, or street..." autocomplete="off"
                autofocus />
        </div>

        <div class="actions">
            <!--<button id="btnMore" style="display:none;">Load More</button>-->
            <button id="btnNear">Find Near Me</button>
        </div>

        <div class="card table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width:15%">Route</th>
                        <th style="width:10%">Yard</th>
                        <th style="width:40%">Intersection</th>
                        <th style="width:15%">6 Car</th>
                        <th style="width:10%">Map</th>
                        <th style="width:10%">Copy</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>

        <div style="text-align:center; padding:20px;">
            <button id="btnMore" style="display:none; padding:10px 20px;">Load More</button>
        </div>
    </div>

    <!-- Configuration -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
