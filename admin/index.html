<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Route Admin Dashboard</title>
    <!-- Use the premium styles from parent folder -->
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Override/Add minor admin specific styles */
        body {
            padding: 20px;
            min-height: 100vh;
        }

        .admin-wrap {
            max-width: 1200px;
            margin: 0 auto;
        }

        table {
            margin-top: 20px;
            background: rgba(18, 22, 36, 0.78);
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: rgba(18, 22, 36, 0.95);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            color: var(--muted);
        }

        td {
            border-bottom: 1px solid rgba(39, 48, 74, 0.4);
        }

        .refresh-btn {
            margin-top: 20px;
            background: var(--accent);
            color: var(--bg);
            font-weight: bold;
            border: none;
        }

        .refresh-btn:hover {
            background: #9bbaff;
        }

        .config-warning {
            border: 1px solid var(--danger);
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <div
        style="position:fixed; top:2px; right:5px; font-size:10px; color:rgba(255,255,255,0.2); pointer-events:none; z-index:9999;">
        v1.9</div>
    <div class="admin-wrap">
        <header style="background:transparent; padding:0; position:relative; box-shadow:none; backdrop-filter:none;">
            <h1>Traffic Logs</h1>
            <div class="meta" style="margin-top:0;">Real-time search activity from Google Sheets</div>
        </header>

        <div id="configWarning" class="config-warning">
            <strong>Setup Required:</strong> Please open <code>js/config.js</code> and paste your Google Web App URL.
        </div>

        <button class="refresh-btn" onclick="loadLogs()">Refresh Logs</button>
        <div id="status" class="meta" style="margin-top:10px;"></div>

        <div class="card" style="box-shadow:none; background:transparent; border:none;">
            <table>
                <colgroup>
                    <col style="width:15%">
                    <col style="width:10%">
                    <col style="width:20%">
                    <col style="width:25%">
                    <col style="width:20%">
                    <col style="width:10%">
                </colgroup>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>User ID</th>
                        <th>Search Query</th>
                        <th>Top Result</th>
                        <th>Intersection</th>
                        <th>Map</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { GOOGLE_SCRIPT_URL } from '../js/config.js';

        const $ = (id) => document.getElementById(id);
        let nicknamesCache = {};

        async function loadNicknamesFromSheets() {
            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("YOUR_")) {
                const stored = localStorage.getItem('device_nicknames');
                nicknamesCache = stored ? JSON.parse(stored) : {};
                return;
            }

            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getNicknames`);
                if (res.ok) {
                    nicknamesCache = await res.json();
                    localStorage.setItem('device_nicknames', JSON.stringify(nicknamesCache));
                } else {
                    throw new Error('Failed to fetch nicknames');
                }
            } catch (err) {
                console.warn('Failed to load nicknames from Google Sheets, using localStorage:', err);
                const stored = localStorage.getItem('device_nicknames');
                nicknamesCache = stored ? JSON.parse(stored) : {};
            }
        }

        async function saveNicknameToSheets(deviceId, nickname) {
            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("YOUR_")) {
                setNicknameLocal(deviceId, nickname);
                return;
            }

            try {
                const params = new URLSearchParams({
                    action: 'setNickname',
                    deviceId: deviceId,
                    nickname: nickname || ''
                });

                const res = await fetch(`${GOOGLE_SCRIPT_URL}?${params.toString()}`);

                if (res.ok) {
                    if (nickname && nickname.trim()) {
                        nicknamesCache[deviceId] = nickname.trim();
                    } else {
                        delete nicknamesCache[deviceId];
                    }
                    localStorage.setItem('device_nicknames', JSON.stringify(nicknamesCache));
                } else {
                    throw new Error('Failed to save nickname');
                }
            } catch (err) {
                console.error('Failed to save nickname to Google Sheets:', err);
                setNicknameLocal(deviceId, nickname);
            }
        }

        function setNicknameLocal(deviceId, nickname) {
            if (nickname && nickname.trim()) {
                nicknamesCache[deviceId] = nickname.trim();
            } else {
                delete nicknamesCache[deviceId];
            }
            localStorage.setItem('device_nicknames', JSON.stringify(nicknamesCache));
        }

        function getDisplayName(deviceId) {
            return nicknamesCache[deviceId] || deviceId;
        }

        window.loadLogs = async function () {
            const status = $("status");
            const tbody = $("logBody");

            if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes("YOUR_")) {
                $("configWarning").style.display = "block";
                status.innerHTML = `<span style="color:var(--danger)">Configuration Missing</span>`;
                return;
            }

            status.innerHTML = `Loading from Google Sheets... <span class="spinner"></span>`;

            await loadNicknamesFromSheets();

            try {
                const res = await fetch(GOOGLE_SCRIPT_URL);
                if (!res.ok) throw new Error("Failed to fetch");

                const logs = await res.json();

                if (logs.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px; color:var(--muted)">No logs found yet.</td></tr>`;
                } else {
                    tbody.innerHTML = logs.map(l => {
                        let timeStr = l.timestamp;
                        try { timeStr = new Date(l.timestamp).toLocaleString(); } catch (e) { }

                        let mapLink = "—";
                        if (l.location) {
                            mapLink = `<a href="https://www.google.com/maps?q=${l.location}" target="_blank" style="color:var(--accent)">View</a>`;
                        }

                        const deviceId = l.user || "Unknown";
                        const displayName = getDisplayName(deviceId);
                        const isNicknamed = displayName !== deviceId;

                        return `
                        <tr>
                            <td>${escape(timeStr)}</td>
                            <td>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <span class="pill" style="display:inline-flex; border:none; background:${isNicknamed ? 'rgba(124, 159, 255, 0.15)' : 'rgba(255,255,255,0.05)'}; font-size:11px;" title="Device ID: ${escape(deviceId)}">${escape(displayName)}</span>
                                    <button class="edit-nickname-btn" data-device-id="${escape(deviceId)}" style="font-size:11px; padding:2px 6px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; border-radius:4px;" title="Edit nickname">✏️</button>
                                </div>
                            </td>
                            <td style="color:var(--accent)">${escape(l.query)}</td>
                            <td>${escape(l.topResultSummary)}</td>
                            <td>${escape(l.intersection)}</td>
                            <td>${mapLink}</td>
                        </tr>
                    `}).join("");

                    document.querySelectorAll('.edit-nickname-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation();
                            const deviceId = btn.getAttribute('data-device-id');
                            const currentNickname = getDisplayName(deviceId);
                            const prompt_text = deviceId === currentNickname
                                ? `Enter a nickname for device "${deviceId}":`
                                : `Edit nickname for device "${deviceId}"\nCurrent: "${currentNickname}"`;

                            const newNickname = prompt(prompt_text, deviceId === currentNickname ? "" : currentNickname);

                            if (newNickname !== null) {
                                status.innerHTML = `Saving... <span class="spinner"></span>`;
                                await saveNicknameToSheets(deviceId, newNickname);
                                status.innerHTML = `<span style="color:var(--success)">Nickname saved!</span>`;
                                setTimeout(() => loadLogs(), 500);
                            }
                        });
                    });
                }

                status.textContent = `Loaded ${logs.length} logs.`;
            } catch (err) {
                status.innerHTML = `<span style="color:var(--danger)">Error: ${err.message}</span>. Check console & CORS settings.`;
            }
        };

        function escape(s) {
            return String(s || "").replaceAll("<", "&lt;");
        }

        loadLogs();
    </script>
</body>

</html>
