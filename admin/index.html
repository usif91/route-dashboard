<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Route Admin Dashboard</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0b0d12;
            color: #e8ebf3;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border-bottom: 1px solid #27304a;
            padding: 12px;
            text-align: left;
        }

        th {
            background: #121624;
            color: #7aa2ff;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        h1 {
            margin-bottom: 0;
        }

        .refresh-btn {
            background: #7aa2ff;
            color: #0b0d12;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .user-tag {
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.2s;
        }

        .user-tag:hover {
            background: rgba(122, 162, 255, 0.3);
        }

        .unknown {
            color: #a8b0c6;
            font-style: italic;
        }
    </style>
</head>

<body>
    <h1>Traffic Logs</h1>
    <button class="refresh-btn" onclick="loadData()">Refresh Data</button>
    <div id="status" style="margin-top:10px; color:#a8b0c6;"></div>
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>User / IP (Click to Rename)</th>
                <th>Search Query</th>
                <th>Top Result</th>
            </tr>
        </thead>
        <tbody id="logBody"></tbody>
    </table>

    <script>
        let logs = [];
        let users = {};

        async function loadData() {
            const status = document.getElementById("status");
            if (window.location.protocol === 'file:') {
                status.innerHTML = `<span style="color:#ff6b6b">Error: You are viewing this file directly!</span>`;
                return;
            }

            status.textContent = "Loading...";

            try {
                const [logRes, userRes] = await Promise.all([
                    fetch('/api/logs'),
                    fetch('/api/users')
                ]);

                if (!logRes.ok || !userRes.ok) throw new Error("Failed to fetch");

                logs = await logRes.json();
                users = await userRes.json();

                renderTable();
                status.textContent = `Loaded ${logs.length} logs.`;
            } catch (err) {
                status.textContent = "Error: " + err.message;
            }
        }

        function renderTable() {
            const tbody = document.getElementById("logBody");
            tbody.innerHTML = logs.map(l => {
                const ip = l.ip || "Unknown IP";
                const name = users[ip] || ip;
                const isNamed = !!users[ip];

                return `
                    <tr>
                        <td>${new Date(l.timestamp).toLocaleString()}</td>
                        <td>
                            <span class="user-tag ${isNamed ? '' : 'unknown'}" 
                                  onclick="renameUser('${ip}', '${escape(name)}')"
                                  title="Click to rename IP: ${ip}">
                                ${escape(name)}
                            </span>
                        </td>
                        <td>${escape(l.query)}</td>
                        <td>${escape(l.topResultSummary)}</td>
                    </tr>
                `;
            }).join("");
        }

        async function renameUser(ip, currentName) {
            const newName = prompt(`Rename user for IP: ${ip}`, currentName === ip ? "" : currentName);
            if (newName && newName !== currentName) {
                try {
                    await fetch('/api/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ip, name: newName })
                    });
                    loadData(); // Reload to show new name
                } catch (e) {
                    alert("Failed to save user name");
                }
            }
        }

        function escape(s) {
            return String(s || "").replaceAll("<", "&lt;");
        }

        loadData();
    </script>
</body>

</html>
